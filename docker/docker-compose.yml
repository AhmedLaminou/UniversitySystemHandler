version: "3.8"

services:
  # ========== BASES DE DONNÉES ==========

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    # ports:
    #   - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - university-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 20s
      retries: 10

  mysql-course:
    image: mysql:8.0
    container_name: mysql-course
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_db
    # ports:
    #   - "3308:3306"
    volumes:
      - mysql-course-data:/var/lib/mysql
    networks:
      - university-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 20s
      retries: 10

  # ========== SERVICES ==========

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_JWT_SECRET: MyVerySecureSecretKeyForAuthenticationJWTTokens2024WithEnoughCharacters
      APP_JWT_EXPIRATION: 86400000
    ports:
      - "8085:8080"
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - university-network
    restart: unless-stopped

  course-service:
    build:
      context: ../services/course-service
      dockerfile: Dockerfile
    container_name: course-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-course:3306/course_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_JWT_SECRET: MyVerySecureSecretKeyForAuthenticationJWTTokens2024WithEnoughCharacters
      APP_JWT_EXPIRATION: 86400000
    ports:
      - "8082:8082"
    depends_on:
      mysql-course:
        condition: service_healthy
    networks:
      - university-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "9090:9090"
    depends_on:
      auth-service:
        condition: service_started
      course-service:
        condition: service_started
    networks:
      - university-network
    restart: unless-stopped

networks:
  university-network:
    driver: bridge

volumes:
  mysql-auth-data:
  mysql-course-data:
